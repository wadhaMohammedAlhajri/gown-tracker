<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gown Distribution — Fast Version</title>

<style>
body{font-family:sans-serif;background:#f5f7ff;padding:20px}
.loading{text-align:center;margin-top:50px}
.table-wrap{margin-top:20px;background:#fff;border-radius:10px;overflow:auto}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #eee;text-align:left}
.done{opacity:.5;text-decoration:line-through}
button{cursor:pointer}
</style>
</head>

<body>

<h2>🎓 Gown Distribution (Fast)</h2>

<div id="loading" class="loading">⏳ Loading...</div>

<div id="content" style="display:none">
<div id="stats"></div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>✔</th>
<th>Name</th>
<th>ID</th>
<th>Size</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

/* 🔥 Firebase */
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "female-undergraduate-students.firebaseapp.com",
  databaseURL: "https://female-undergraduate-students-default-rtdb.firebaseio.com",
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

/* 🚀 Fast Sheet API */
const SHEET_ID = '1NPHSBmRbXx6gOD2Ji7Njzsh6ElR4AT8dmYRNcudTNm4';
const SHEET_NAME = 'system list';
const SHEET_URL = `https://opensheet.elk.sh/${SHEET_ID}/${encodeURIComponent(SHEET_NAME)}`;

let ALL = [];
let state = {};

/* 🚀 Load Data */
async function loadData(){
  document.getElementById('loading').style.display='block';

  const CACHE_KEY='cache_v2';
  const TTL=15*60*1000;

  const cached=sessionStorage.getItem(CACHE_KEY);
  if(cached){
    const {data,ts}=JSON.parse(cached);
    if(Date.now()-ts<TTL){
      ALL=data;
      afterLoad();
      return;
    }
  }

  const res=await fetch(SHEET_URL);
  const data=await res.json();

  ALL=data
    .filter(r=>r['Student Name'])
    .map((r,i)=>({
      id:r['Sr. No']||String(i),
      name:r['Student Name'],
      studentId:r['Student ID']||'',
      size:r['Size']||'',
      delivered:(r['Status']||'').toLowerCase()==='delivered'
    }));

  sessionStorage.setItem(CACHE_KEY,JSON.stringify({data:ALL,ts:Date.now()}));

  afterLoad();
}

/* 🚀 After Load */
function afterLoad(){
  requestAnimationFrame(()=>{
    render();
    updateStats();
  });

  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';
}

/* 🚀 Render */
function render(){
  const tb=document.getElementById('tbody');
  tb.innerHTML='';

  ALL.forEach(st=>{
    const tr=document.createElement('tr');
    tr.id='row-'+st.id;

    const done=state[st.id]?.delivered ?? st.delivered;

    if(done) tr.classList.add('done');

    tr.innerHTML=`
    <td><input type="checkbox" ${done?'checked':''}
      onchange="toggle('${st.id}',this.checked)"></td>
    <td>${st.name}</td>
    <td>${st.studentId}</td>
    <td>${st.size}</td>
    <td>${done?'✅':'⏳'}</td>
    `;

    tb.appendChild(tr);
  });
}

/* 🚀 Stats */
function updateStats(){
  const total=ALL.length;
  const done=ALL.filter(s=>state[s.id]?.delivered || s.delivered).length;

  document.getElementById('stats').innerHTML=
    `Total: ${total} | Done: ${done}`;
}

/* 🚀 Toggle */
window.toggle=function(id,val){
  if(!state[id]) state[id]={};
  state[id].delivered=val?1:0;

  update(ref(db,'gown/'+id),{delivered:state[id].delivered});

  const tr=document.getElementById('row-'+id);
  tr.classList.toggle('done',val);

  updateStats();
}

/* 🚀 Firebase Sync (خفيف) */
onValue(ref(db,'gown'),snap=>{
  state=snap.val()||{};
  updateStats();

  ALL.forEach(st=>{
    const tr=document.getElementById('row-'+st.id);
    if(!tr) return;

    const done=state[st.id]?.delivered ?? st.delivered;

    tr.classList.toggle('done',done);

    const cb=tr.querySelector('input');
    cb.checked=done;
  });
});

loadData();
</script>

</body>
</html>
